<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Classroom Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Classroom Helper</h1>
        <p id="statusText">読み込み中...</p>
      </header>

      <section class="feature-list" aria-label="機能">
        <label class="feature-toggle">
          <span class="feature-copy">
            <span class="feature-title">動画文字起こし自動コピー</span>
            <span class="feature-description">動画を開いたら文字起こしをクリップボードへコピー</span>
          </span>
          <span class="toggle-control">
            <input id="autoCopy" type="checkbox" role="switch">
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>

        <label class="feature-toggle">
          <span class="feature-copy">
            <span class="feature-title">添付資料ダウンロード</span>
            <span class="feature-description">Classroom の資料カードに直接ダウンロードボタンを表示</span>
          </span>
          <span class="toggle-control">
            <input id="showAttachmentDownloadButtons" type="checkbox" role="switch">
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>

        <label class="feature-toggle">
          <span class="feature-copy">
            <span class="feature-title">期限カード強調</span>
            <span class="feature-description">期限が近い課題のあるクラスカードを枠で強調</span>
          </span>
          <span class="toggle-control">
            <input id="showDueSoonHighlights" type="checkbox" role="switch">
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>

        <label class="feature-toggle">
          <span class="feature-copy">
            <span class="feature-title">期限カードを上部表示</span>
            <span class="feature-description">期限が近いクラスを Classroom ホーム上部へ表示</span>
          </span>
          <span class="toggle-control">
            <input id="autoSortDueSoonClasses" type="checkbox" role="switch">
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>

        <label class="feature-toggle">
          <span class="feature-copy">
            <span class="feature-title">期限通知</span>
            <span class="feature-description">期限が近い課題を Chrome の通知で知らせる</span>
          </span>
          <span class="toggle-control">
            <input id="notifyDueSoonAssignments" type="checkbox" role="switch">
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
